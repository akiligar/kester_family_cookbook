site_name: Kester Family Cookbook
site_description: Permanent family cookbook and meal planning reference for the Kester household.
site_url: https://cookbook.connellkesters.com/
repo_url: https://github.com/akiligar/kester_family_cookbook
repo_name: akiligar/kester_family_cookbook

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Recipes:
      - recipes/index.md
      - Main Dishes:
          - recipes/main-dishes/index.md
          - Beef:
              - Grilled Flank Steak with Chimichurri: recipes/main-dishes/grilled-flank-steak-chimichurri.md
          - Chicken:
              - recipes/main-dishes/index.md#chicken
          - Pork:
              - recipes/main-dishes/index.md#pork
          - Seafood:
              - recipes/main-dishes/index.md#seafood
          - Turkey:
              - recipes/main-dishes/index.md#turkey
          - Vegetarian:
              - recipes/main-dishes/index.md#vegetarian
      - Side Dishes: recipes/sides/index.md
      - Sauces: recipes/sauces/index.md
      - Breakfast:
          - recipes/breakfast/index.md
      - Work Boxes:
          - recipes/work-boxes/index.md
  - Planning:
      - planning/index.md
      - Seasonal Planning: planning/seasonal-planning.md
      - Rotation Review: planning/rotation-review.md
  - Editorial:
      - editorial/index.md
      - Family Preferences: editorial/family-preferences.md
      - Editorial Standards:
          - Recipe Standards: editorial/recipe-standards.md
          - Recipe Template: editorial/recipe-template.md
          - Recipe Lifecycle: editorial/recipe-lifecycle.md
          - Metadata Standard: editorial/metadata-standard.md
          - Transformation Workflow: editorial/transformation-workflow.md
      - Project Playbook:
          - Change Log: editorial/change-log.md
          - Rotation Workflow: editorial/rotation-to-recipe-workflow.md
          - Publishing and AnyList Cooking: editorial/anylist-sync-workflow.md
  - Reference:
      - reference/index.md
      - Pantry Staples: reference/pantry-staples.md
      - Equipment: reference/equipment.md
      - Seasonal Index: reference/seasonal-index.md
      - Ingredient Index: reference/ingredient-index.md
      - Work Box Index: reference/work-box-index.md
